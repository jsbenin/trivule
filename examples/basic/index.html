<!doctype html>
<html lang="en">

<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Trivule - Test</title>
  <style>
    .is-valid {
      border-color: green;
    }

    .is-invalid {
      border-color: red;
    }

    .error-message {
      color: red;
      font-size: 0.9em;
    }
  </style>
</head>

<body>
  <h1>Trivule Global Initialization Demo</h1>

  <form @v:form @v:events="blur">
    <div>
      <label for="email">Email:</label>
      <input type="text" id="email" name="email" @v:rules="required|email" @v:msg.required="Email obligatoire"
        @v:msg.email="Please provide a valid email" />
      <p @v:feedback="email" class="is-invalid"></p>
    </div>

    <div>
      <label for="password">Password:</label>
      <input type="password" id="password" name="password" @v:rules="required|min:6"
        @v:msg.required="Mot de passe obligatoire" @v:msg.min="Champ obligatoire" />
      <p @v:feedback="password" class="is-invalid"></p>
    </div>

    <button type="submit" @v:submit>Register</button>
  </form>

  <script src="./main.ts" type="module"></script>
</body>

</html>
