<!doctype html>
<html lang="en">

<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Trivule - Modern Form Validation</title>
<link href="./style.css" rel="stylesheet">
  <style>
    body {
      font-family: 'Plus Jakarta Sans', sans-serif;
    }
  </style>
</head>

<body class="bg-slate-50 min-h-screen flex items-center justify-center p-6">
  <div class="max-w-md w-full">
        <div class="bg-white rounded-3xl shadow-xl shadow-slate-200/60 p-8 border border-slate-100">
      <form @v:form @v:events="blur" class="space-y-6">
        <div>
          <label for="email" class="block text-sm font-semibold text-slate-700 mb-2 ml-1">Email Address</label>
          <input type="text" id="email" name="email" placeholder="name@company.com" 
            class="input-field"
            @v:rules="required|email" 
            @v:msg.required="Email is required"
            @v:msg.email="Please enter a valid email address" />
          <p @v:feedback="email" class="feedback-message"></p>
        </div>

        <div>
          <label for="password" class="block text-sm font-semibold text-slate-700 mb-2 ml-1">Password</label>
          <input type="password" id="password" name="password" placeholder="••••••••" 
            class="input-field"
            @v:rules="required|min:6"
            @v:msg.required="Password is required" 
            @v:msg.min="Password must be at least 6 characters" />
          <p @v:feedback="password" class="feedback-message"></p>
        </div>

        <div>
          <label for="confirm_password" class="block text-sm font-semibold text-slate-700 mb-2 ml-1">Confirm Password</label>
          <input type="password" id="confirm_password" name="confirm_password" placeholder="••••••••" 
            class="input-field"
            @v:rules="required|same:password" 
            @v:msg.required="Please confirm your password"
            @v:msg.same="Passwords do not match" />
          <p @v:feedback="confirm_password" class="feedback-message"></p>
        </div>

        <div class="pt-2">
          <button type="submit" @v:submit>
            Get Started
          </button>
        </div>
      </form>
    </div>
  </div>

  <script src="./main.ts" type="module"></script>
</body>

</html>
